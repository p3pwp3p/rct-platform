name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치에서 새 푸시가 오면 이전 실행 취소 (CI 시간·비용 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Lint 는 레거시 경고가 남아있어 아직 비차단(정보용). 정리되면 게이트로 승격.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (수당 계산 등)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # 빌드 통과용 플레이스홀더 (실제 값 아님 — 런타임엔 Vercel 환경변수 사용)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
